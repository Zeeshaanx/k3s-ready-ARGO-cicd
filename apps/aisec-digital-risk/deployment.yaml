apiVersion: apps/v1
kind: Deployment
metadata:
  name: aisec-digital-risk
  namespace: services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aisec-digital-risk
  template:
    metadata:
      labels:
        app: aisec-digital-risk
    spec:
      containers:
      - name: aisec-digital-risk
        image: 825765396079.dkr.ecr.us-east-1.amazonaws.com/aisec-digital-risk:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        env:
        - name: POSTGRES_USER
          value: "postgres"
        - name: POSTGRES_PASSWORD
          value: "postgres"
        - name: POSTGRES_DB
          value: "media_intel"
        - name: ENVIRONMENT
          value: "production"
        - name: DATABASE_URL
          value: "postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/media_intel"
        - name: DATABASE_URL_SYNC
          value: "postgresql://postgres:postgres@127.0.0.1:5432/media_intel"
        - name: SEARXNG_URL
          value: "http://127.0.0.1:8080/"
---
apiVersion: v1
kind: Service
metadata:
  name: aisec-digital-risk-service
  namespace: services
spec:
  selector:
    app: aisec-digital-risk
  ports:
  - port: 80
    targetPort: 80
