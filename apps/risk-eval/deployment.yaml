apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-eval
  namespace: services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: risk-eval
  template:
    metadata:
      labels:
        app: risk-eval
    spec:
      imagePullSecrets:
      - name: ecr-secret
      containers:
      - name: risk-eval
        image: 825765396079.dkr.ecr.us-east-1.amazonaws.com/risk-eval:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: risk-eval-service
  namespace: services
spec:
  selector:
    app: risk-eval
  ports:
  - port: 80
    targetPort: 8000
